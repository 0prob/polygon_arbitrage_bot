type PoolMeta {
  id: ID!
  address: String! @index
  protocol: String! @index
  tokens: [String!]!
  fee: Int
  tickSpacing: Int
  createdBlock: Int! @index
  createdTx: String
  poolId: String @index # For Balancer
}

type BalancerPoolIdToAddress {
  id: ID! # poolId
  address: String! @index
}

type V2PoolState {
  id: ID!
  address: String! @index
  lastUpdatedBlock: Int! @index
  reserve0: BigInt!
  reserve1: BigInt!
  fee: Int
}

type V3PoolState {
  id: ID!
  address: String! @index
  lastUpdatedBlock: Int! @index
  sqrtPriceX96: BigInt!
  liquidity: BigInt!
  tick: Int!
  fee: Int
  tickSpacing: Int # Added for arbitrage math parity with V4PoolState
}

type V4PoolState {
  id: ID!
  address: String! @index
  lastUpdatedBlock: Int! @index
  sqrtPriceX96: BigInt!
  liquidity: BigInt!
  tick: Int!
  fee: BigInt!
  tickSpacing: Int!
  hooks: String!
}

type CurvePoolState {
  id: ID!
  address: String! @index
  lastUpdatedBlock: Int! @index
  balances: [BigInt!]!
  A: BigInt!
  fee: BigInt!
  rates: [BigInt!]
}

type BalancerPoolState {
  id: ID!
  address: String! @index
  lastUpdatedBlock: Int! @index
  poolId: String! @index
  balances: [BigInt!]!
  weights: [BigInt!]
  amp: BigInt
  swapFee: BigInt!
  scalingFactors: [BigInt!]
}

type DodoPoolState {
  id: ID!
  address: String! @index
  lastUpdatedBlock: Int! @index
  baseReserve: BigInt!
  quoteReserve: BigInt!
  targetBase: BigInt!
  targetQuote: BigInt!
  rStatus: Int!
  k: BigInt!
  fee: BigInt!
  i: BigInt!
  lpFeeRate: BigInt!
  mtFeeRate: BigInt!
}

type TokenMeta {
  id: ID!
  address: String! @index
  decimals: Int
}
