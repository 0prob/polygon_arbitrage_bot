type PoolMeta {
  id: ID!
  address: String!
  protocol: String!
  tokens: [String!]!
  fee: Int
  tickSpacing: Int
  createdBlock: Int!
  createdTx: String
  poolId: String # For Balancer
}

type BalancerPoolIdToAddress {
  id: ID! # poolId
  address: String!
}

type V2PoolState {
  id: ID!
  address: String!
  lastUpdatedBlock: Int!
  reserve0: BigInt!
  reserve1: BigInt!
}

type V3PoolState {
  id: ID!
  address: String!
  lastUpdatedBlock: Int!
  sqrtPriceX96: BigInt!
  liquidity: BigInt!
  tick: Int!
}

type V4PoolState {
  id: ID!
  address: String!
  lastUpdatedBlock: Int!
  sqrtPriceX96: BigInt!
  liquidity: BigInt!
  tick: Int!
  fee: BigInt!
  tickSpacing: Int!
  hooks: String!
}

type CurvePoolState {
  id: ID!
  address: String!
  lastUpdatedBlock: Int!
  balances: [BigInt!]!
  A: BigInt!
  fee: BigInt!
}

type BalancerPoolState {
  id: ID!
  address: String!
  lastUpdatedBlock: Int!
  poolId: String!
  balances: [BigInt!]!
  weights: [BigInt!]
  amp: BigInt
  swapFee: BigInt!
}

type DodoPoolState {
  id: ID!
  address: String!
  lastUpdatedBlock: Int!
  baseReserve: BigInt!
  quoteReserve: BigInt!
  targetBase: BigInt!
  targetQuote: BigInt!
