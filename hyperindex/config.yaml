name: arb_bot_ingestion
description: "High-performance DEX indexing for arbitrage opportunities"
rollback_on_reorg: false
raw_events: false
full_batch_size: 10000

handlers: src/handlers
chains:
  - id: 137
    start_block: ${POLYGON_START_BLOCK:-5484533}
    hypersync_config:
      url: https://polygon.hypersync.xyz
    contracts:
      # Consolidated V2 Factories
      - name: V2Factory
        start_block: 5484533 # Quickswap deployment
        address:
          - "0x5757371414417b8c6caad45baef941abc7d3ab32" # Quickswap
          - "0xc35dadb65012ec5796536bd9864ed8773abc74c4" # Sushi
          - "0x9e5a52f57b3038f1b8eee45f28b3c1967e22799c" # Uniswap
          - "0xe7fb3e833efe5f9c441105eb65ef8b261266423b" # Dfyn
          - "0xcf083be4164828f00cae704ec15a36d711491284" # Apeswap
          - "0x9f3044f7f9fc8bc9ed615d54845b4577b833282d" # Meshswap
          - "0x668ad0ed2622c62e24f0d5ab6b6ac1b9d2cd4ac7" # Jetswap
          - "0x800b052609c355ca8103e06f022aa30647ead60a" # Cometh
        abi_file_path: abis/uniswap_v2_factory.json
        handler: src/handlers/v2_factory.ts
        events:
          - event: PairCreated
            field_selection:
              transaction_fields: ["hash"]
      
      # Consolidated V3 Factories
      - name: V3Factory
        start_block: 22757547 # Uniswap V3 deployment
        address:
          - "0x1f98431c8ad98523631ae4a59f267346ea31f984" # Uniswap
          - "0x917933899c6a5f8e37f31e19f92cdbff7e8ff0e2" # Sushi
          - "0x411b0facc3489691f28ad58c47006af5e3ab3a28" # Quickswap
          - "0x5f1dddbf348ac2fbe22a163e30f99f9ece3dd50a" # Kyberswap
        abi_file_path: abis/uniswap_v3_factory.json
        handler: src/handlers/v3_factory.ts
        events:
          - event: PoolCreated
            field_selection:
              transaction_fields: ["hash"]

      # Wildcard Pools (Dynamically Registered)
      - name: UniswapV2Pool
        start_block: 5484533
        abi_file_path: abis/uniswap_v2_pool.json
        handler: src/handlers/v2_pool.ts
        events:
          - event: Sync
            field_selection:
              transaction_fields: ["hash"]

      - name: UniswapV3Pool
        start_block: 22757547
        abi_file_path: abis/uniswap_v3_pool.json
        handler: src/handlers/v3_pool.ts
        events:
          - event: Swap
            field_selection:
              transaction_fields: ["hash"]

      # Specific Single-Address Contracts
      - name: CurveRegistry
        start_block: 28641368
        address: "0x296d2B5C23833A70D07c8fCBB97d846c1ff90DDD"
        abi_file_path: abis/curve_factory.json
        handler: src/handlers/curve_factory.ts
        events:
          - event: PoolAdded
            field_selection:
              transaction_fields: ["hash"]

      - name: CurvePool
        start_block: 28641368
        abi_file_path: abis/curve_pool.json
        handler: src/handlers/curve_pool.ts
        events:
          - event: TokenExchange
            field_selection:
              transaction_fields: ["hash"]
          - event: AddLiquidity
            field_selection:
              transaction_fields: ["hash"]
          - event: RemoveLiquidity
            field_selection:
              transaction_fields: ["hash"]
          - event: RemoveLiquidityOne
            field_selection:
              transaction_fields: ["hash"]

      - name: PoolManager
        start_block: 66980384 # Uniswap V4 deployment
        address: "0x67366782805870060151383f4bbff9dab53e5cd6"
        abi_file_path: abis/uniswap_v4_pool_manager.json
        handler: src/handlers/v4.ts
        events:
          - event: Initialize
            field_selection:
              transaction_fields: ["hash"]
          - event: Swap
            field_selection:
              transaction_fields: ["hash"]

      - name: BalancerVault
        start_block: 16335686
        address: "0xba12222222228d8ba445958a75a0704d566bf2c8"
        abi_file_path: abis/balancer_vault.json
        handler: src/handlers/balancer.ts
        events:
          - event: PoolRegistered
            field_selection:
              transaction_fields: ["hash"]
          - event: TokensRegistered
            field_selection:
              transaction_fields: ["hash"]
          - event: Swap
            field_selection:
              transaction_fields: ["hash"]
          - event: PoolBalanceChanged(bytes32 indexed poolId, address indexed liquidityProvider, address[] tokens, int256[] amounts, uint256[] paidProtocolSwapFeeAmounts)
            field_selection:
              transaction_fields: ["hash"]

      # DODO V2 Factories
      - name: DodoFactory
        start_block: 13630000
        address:
          - "0x79887f65f83bdf15bcc8736b5e5bcdb48fb8fe13" # DVM
          - "0xdfaf9584f5d229a9dbe5978523317820a8897c5a" # DPP
          - "0x4d97e480ea49ac57ce8c1f7c79b1a0c3d4adc7c4" # DSP
        abi_file_path: abis/dodo_factory.json
        handler: src/handlers/dodo_factory.ts
        events:
          - event: DVMDeployed
            field_selection:
              transaction_fields: ["hash"]
          - event: DPPDeployed (address baseToken, address quoteToken, address creator, address dpp)
            field_selection:
              transaction_fields: ["hash"]
          - event: DSPDeployed (address baseToken, address quoteToken, address creator, address dsp)
            field_selection:
              transaction_fields: ["hash"]

      - name: DodoPool
        start_block: 13630000
        abi_file_path: abis/uniswap_v2_pool.json
        handler: src/handlers/dodo_pool.ts
        events:
          - event: Sync
            field_selection:
              transaction_fields: ["hash"]

  - id: 747474
    start_block: ${KATANA_START_BLOCK:-0}
    hypersync_config:
      url: https://katana.hypersync.xyz
    contracts:
      - name: SushiV2Factory
        address: "0x72d111b4d6f31b38919ae39779f570b747d6acd9"
        abi_file_path: abis/uniswap_v2_factory.json
        handler: src/handlers/katana/v2_factory.ts
        events:
          - event: PairCreated
            field_selection:
              transaction_fields: ["hash"]
      - name: KatanaV2Pool
        abi_file_path: abis/uniswap_v2_pool.json
        handler: src/handlers/katana/v2_pool.ts
        events:
          - event: Sync
            field_selection:
              transaction_fields: ["hash"]
      - name: SushiV3Factory
        address: "0x203e8740894c8955cB8950759876d7E7E45E04c1"
        abi_file_path: abis/uniswap_v3_factory.json
        handler: src/handlers/katana/v3_factory.ts
        events:
          - event: PoolCreated
            field_selection:
              transaction_fields: ["hash"]
      - name: KatanaV3Pool
        abi_file_path: abis/uniswap_v3_pool.json
        handler: src/handlers/katana/v3_pool.ts
        events:
          - event: Swap
            field_selection:
              transaction_fields: ["hash"]
