name: arb_bot_ingestion
description: "High-performance DEX indexing for arbitrage opportunities (Polygon-optimized)"
# Best practice (2026 docs): Keep reorg support enabled in production for safety.
# HyperIndex handles rollbacks automatically when enabled.
rollback_on_reorg: true
raw_events: false

# === LIVE DEBUG INDEXER (Rate Limit Reality + Fast Tail on Free Token) ===
# Run with `bun run dev` or `envio start`.
#
# This indexer is intentionally configured as a *lightweight live discovery feed* for the arb bot:
# - No per-Sync/Swap state writes (see handler no-ops) → DB writes near zero in live tail.
# - Bot's primary pool state comes from its own RPC fetcher + multicalls (LF path).
# - Hasura is used for: (a) 60s discovery of *new* pools, (b) best-effort bootstrap cache.
#
# CRITICAL OBSERVED BEHAVIOR (May 2026 debug run):
# - Free / low-tier ENVIO_API_TOKEN (60-200 req/min HyperSync, 200 on paid starter) + full Polygon history from 5M
#   → massive rate-limit backoff + slow catch-up (many "rate limit exhausted" + partition retries).
# - "Block not found in HyperSync" messages are benign (partition drift) and auto-retried.
#
# For usable live-debug runs on free token:
#   1. Set POLYGON_START_BLOCK in .env to a recent block (e.g. 86500000 or higher).
#   2. The per-contract overrides below that are older will still respect the global unless you also
#      raise them. For pure "new pools only" you can override the global high and leave lowers.
#   3. full_batch_size raised to 5000 (user request after observing heavy Initialize/PoolCreated handlers).
#
# To do a true full historical backfill: use a paid ENVIO_API_TOKEN + higher batch + more RAM.
#
# === Backfill / Live performance debugging (Pipeline Split) ===
# Envio "Pipeline split" (visible in envio dev / metrics) shows time distribution:
#   Loaders | Handlers | DB Writes
#
# Ideal for a live debug indexer: Loaders + Handlers dominate, DB Writes near zero.
# Previously (pre-2026-05 fix): DB Writes often 50-60%+ due to unconditional
#   *PoolState.set() on every Sync/Swap/TokenExchange/etc. in the per-pool handlers.
#
# Fix applied: Removed all per-event mutable state writes from high-volume handlers:
#   - v2_pool.ts, v3_pool.ts, curve_pool.ts, dodo_pool.ts, v4.ts (Swap), balancer.ts (Swap/PoolBalanceChanged)
#   - Only creation-time writes remain (factory/registry events + V4 Initialize + DODO factory handlers).
#
# Result for "live debug indexer" (`envio dev` while bot runs):
#   - DB Writes → minimal (pool discovery metadata only)
#   - Loaders → token metadata effects on first-seen pools (dominated by STATIC_TOKEN_DECIMALS hit rate)
#   - Handlers → tiny (mostly contractRegister + PoolMeta/TokenMeta sets on creation)
#
# The arb bot tolerates this because:
#   - Primary live state source is its own RPC fetcher (fetchMissingPoolState in LF path).
#   - buildStateCacheFromGraphQL is best-effort bootstrap at startup + periodic refresh.
#   - Pool discovery (new PairCreated/PoolCreated/...) still flows through Hasura → bot.
#
# Historical full backfill still works (no schema change), but live tail is now cheap on DB.
#
# Observed (May 2026): V2Factory.PairCreated remains the heaviest single handler due to
# two fetchTokenMeta effects. Keep scripts/generate-polygon-tokens.ts output complete.
#
# Remaining throughput factors (after DB write elimination):
# 1. Effect latency on first-seen pools (token/curve/dodo/balancer metadata).
#    Mitigated by STATIC_TOKEN_DECIMALS registry + cache: true + Promise.all parallelization.
# 2. full_batch_size (currently 5000) and number of dynamic contracts (thousands of V2/V3 pools).
# 3. HyperSync quota / ENVIO_API_TOKEN quality.
#    Multiple free keys are now auto-rotated (see root .env.example section 6 and src/infra/hypersync/api_token_pool.ts).
#    Put several keys in hyperindex/.env (supports ENVIO_API_TOKEN=... lines or ENVIO_API_TOKENS=comma,sep) or set ENVIO_API_TOKENS in the root .env.
#    On rate-limit pain the HyperIndexMonitor forces a restart, which picks the next key from the pool.
# 4. POLYGON_RPC_URLS quality for effect fallbacks.
#
# To observe real-time:
#   - Run `bun run dev` (or the bot) and watch envio stdout for "events", "processed", block arrows.
#   - The bot's HyperIndexMonitor logs blk/s every ~30s (proxy for overall throughput).
#   - For raw eps + pipeline split, use `envio dev` TUI/metrics or grep logs.
#   - Slow effect warnings (SLOW_EFFECT) are emitted by instrumentation in src/utils/instrumentation.ts
#     for any effect >50ms — these are the direct cause of high "Loaders" % in the pipeline split.
#
# After a full backfill + warm caches, "live tail" (new blocks) now sustains very high event/s
# with near-zero DB write cost (the previous 50-60% DB Writes tax is gone).
# Cold full-history backfill on Polygon from 2021 is still gated by effect loaders on first-seen pools + batch size.

# Polygon optimization: 3000-8000 range for Polygon (very high log volume from 1000s of DEX pools).
# This is one of the most important config knobs for "events per second" during historical backfill.
# - 5000 → current setting (good throughput for heavy Initialize/PoolCreated handlers).
# - Higher (7000-10000) → faster backfill if you have headroom on RPC quota and RAM.
# - Lower (2000-4000) → more stable under heavy load or limited RPC allowance.
# The cache: true on all effects + Promise.all parallelization in registration handlers
# make repeated work cheap after warm-up. Per-event state writes removed for live debug profile.
full_batch_size: 5000
# 5000 (raised after observing PoolManager.Initialize + V3Factory.PoolCreated as top 2 slowest
# due to effect/loader time on first-seen tokens/pools). Envio default/recommendation for Polygon
# is 3000-8000. Larger batches help amortize effect work across more events when you have RPC headroom
# (see instrumentation.ts point 5). Use lower (e.g. 3000) only if hitting quota instability.

# HyperSync is the recommended high-performance data source (2000x faster than RPC).
# Token is passed via ENVIO_API_TOKEN (required for production use per 2026 docs).
#
# Single-chain Polygon configuration (Katana removed).
#
# Effects (token metadata, Balancer/Curve/DODO reads) use a centralized batched RPC client with fallback.
# The host process probes + filters for archival support and prefers endpoints from POLYGON_RPC_URLS
# (set in root .env) before falling back to free public RPCs (after removing any that fail historical calls).
# Set POLYGON_RPC_URLS (comma-separated) in your .env for custom/paid providers with archive.
chains:
  - id: 137
    # OPTIMIZATION (Point 1): Exact start_block per chain/contract.
    # Avoid start_block: 0 when deployment blocks are known — it wastes processing on irrelevant history.
    # Global default here is conservative (env override or ~Quickswap-era 5.48M). Per-contract overrides
    # below are precise to each protocol's deployment and take precedence.
    # Recommended: set POLYGON_START_BLOCK in .env to a realistic recent value if doing partial re-syncs.
    start_block: ${POLYGON_START_BLOCK:-5024576} # LIVE-DEBUG DEFAULT: recent block for fast tail on free/low-tier tokens. Override in .env for full history (paid token recommended). Old per-contract overrides below are kept for precision when a higher global is not set.
    
    # RPC fallback (Best practice): Switches to RPC if HyperSync becomes unavailable for >20s.
    # Ensures high availability and automatic failover.
    rpc: ${POLYGON_RPC_URL}

    # Max reorg depth (Polygon best practice): Standard depth to handle rollbacks.
    # HyperIndex automatically handles these when rollback_on_reorg is true.
    max_reorg_depth: 200

    # === Envio/HyperSync Optimizations (see user best-practices) ===
    # Point 2: All contracts below use tight event whitelists (never empty/generic). HyperSync drops
    #          unneeded payloads before they reach the indexer → major historical sync speedup.
    # Point 4: Preload optimization is enabled by default in Envio v3 (batched entity pre-fetch alongside
    #          event processing). No explicit flag required; visible in metrics as "envio_preload_*".
    # Point 3: Factory contracts use the modern `indexer.contractRegister` (object form, supports `where`)
    #          + `context.chain.<Name>.add(...)`. We also demonstrate `where` filtering on contractRegister
    #          for early topic-level rejection (see handlers/v2_factory.ts, dodo_factory.ts etc.).
    #          This is one of the highest-ROI optimizations from the Envio v3 audit.
    # Point 5: N/A here. JoinMode (JoinNothing) applies to direct @envio-dev/hypersync-client log queries
    #          with complex field selection. Our usage is either (a) the managed HyperIndex pipeline or
    #          (b) simple block queries + post-index Hasura GraphQL against the DB (no joins needed).
    hypersync_config:
      url: ${POLYGON_HYPERSYNC_URL:-https://polygon.hypersync.xyz}
      # api_token can also be set here, but ENVIO_API_TOKEN env var is the standard approach.
    contracts:
      # Consolidated V2 Factories (Point 1 + Point 3: exact start_block + dynamic registration in handler)
      - name: V2Factory
        start_block: ${POLYGON_START_BLOCK:-5024576} # Quickswap V2 deployment
        address:
          - "0x5757371414417b8c6caad45baef941abc7d3ab32" # Quickswap
          - "0xc35dadb65012ec5796536bd9864ed8773abc74c4" # Sushi
          - "0x9e5a52f57b3038f1b8eee45f28b3c1967e22799c" # Uniswap
          - "0xe7fb3e833efe5f9c441105eb65ef8b261266423b" # Dfyn
          - "0xcf083be4164828f00cae704ec15a36d711491284" # Apeswap
          - "0x9f3044f7f9fc8bc9ed615d54845b4577b833282d" # Meshswap
          - "0x668ad0ed2622c62e24f0d5ab6b6ac1b9d2cd4ac7" # Jetswap
          - "0x800b052609c355ca8103e06f022aa30647ead60a" # Cometh
        abi_file_path: abis/uniswap_v2_factory.json
        # handler removed - using automatic registration from src/handlers/ (V3 style)
        events:
          - event: PairCreated
            field_selection:
              transaction_fields: ["hash"]
      
      # Consolidated V3 Factories (Point 1 + Point 3: exact start_block + dynamic registration in handler)
      - name: V3Factory
        start_block: ${POLYGON_START_BLOCK:-22757547} # Uniswap V3 deployment
        address:
          - "0x1f98431c8ad98523631ae4a59f267346ea31f984" # Uniswap
          - "0x917933899c6a5f8e37f31e19f92cdbff7e8ff0e2" # Sushi
          - "0x411b0facc3489691f28ad58c47006af5e3ab3a28" # Quickswap
          - "0x5f1dddbf348ac2fbe22a163e30f99f9ece3dd50a" # Kyberswap
        abi_file_path: abis/uniswap_v3_factory.json
        # handler removed - automatic registration from src/handlers/ (V3)
        events:
          - event: PoolCreated
            field_selection:
              transaction_fields: ["hash"]

      # Wildcard Pools (Dynamically Registered)
      - name: UniswapV2Pool
        start_block: ${POLYGON_START_BLOCK:-5024576}
        abi_file_path: abis/uniswap_v2_pool.json
        # Live-debug no-op handler. Use minimal field_selection since we ignore the event body.
        events:
          - event: Sync
            field_selection:
              # Only what's needed for the (no-op) handler + any monitoring. HyperSync drops the rest early.
              transaction_fields: ["hash"]

      - name: UniswapV3Pool
        start_block: ${POLYGON_START_BLOCK:-22757547}
        abi_file_path: abis/uniswap_v3_pool.json
        # handler removed - automatic registration from src/handlers/ (V3)
        events:
          - event: Swap
            field_selection:
              transaction_fields: ["hash"]
          - event: Initialize
            field_selection:
              transaction_fields: ["hash"]

      # Specific Single-Address Contracts
      # CurveRegistry (Point 1 + Point 3: exact start_block + dynamic registration in curve_factory.ts)
      - name: CurveRegistry
        start_block: ${POLYGON_START_BLOCK:-10000000}
        address: "0x296d2B5C23833A70D07c8fCBB97d846c1ff90DDD"
        abi_file_path: abis/curve_factory.json
        # handler removed - automatic registration from src/handlers/ (V3)
        events:
          - event: PoolAdded
            field_selection:
              transaction_fields: ["hash"]

      # CurvePool
      - name: CurvePool
        start_block: ${POLYGON_START_BLOCK:-10000000}
        abi_file_path: abis/curve_pool.json
        # handler removed - automatic registration from src/handlers/ (V3)
        events:
          - event: TokenExchange
            field_selection:
              transaction_fields: ["hash"]
          - event: AddLiquidity
            field_selection:
              transaction_fields: ["hash"]
          - event: RemoveLiquidity
            field_selection:
              transaction_fields: ["hash"]
          - event: RemoveLiquidityOne
            field_selection:
              transaction_fields: ["hash"]

      - name: PoolManager
        start_block: ${POLYGON_START_BLOCK:-66980384} # Uniswap V4 deployment
        address: "0x67366782805870060151383f4bbff9dab53e5cd6"
        abi_file_path: abis/uniswap_v4_pool_manager.json
        # handler removed - automatic registration from src/handlers/ (V3)
        events:
          - event: Initialize
            field_selection:
              transaction_fields: ["hash"]
          - event: Swap
            field_selection:
              transaction_fields: ["hash"]

      - name: BalancerVault
        start_block: ${POLYGON_START_BLOCK:-15832990}
        address: "0xba12222222228d8ba445958a75a0704d566bf2c8"
        abi_file_path: abis/balancer_vault.json
        # handler removed - automatic registration from src/handlers/ (V3)
        events:
          - event: PoolRegistered
            field_selection:
              transaction_fields: ["hash"]
          - event: TokensRegistered
            field_selection:
              transaction_fields: ["hash"]
          - event: Swap
            field_selection:
              transaction_fields: ["hash"]
          - event: PoolBalanceChanged
            field_selection:
              transaction_fields: ["hash"]

      # DODO V2 Factories (Point 1 + Point 3: exact start_block + dynamic registration added in dodo_factory.ts)
      - name: DodoFactory
        start_block: ${POLYGON_START_BLOCK:-14722979}
        address:
          - "0x79887f65f83bdf15bcc8736b5e5bcdb48fb8fe13" # DVM
          - "0xdfaf9584f5d229a9dbe5978523317820a8897c5a" # DPP
          - "0x4d97e480ea49ac57ce8c1f7c79b1a0c3d4adc7c4" # DSP
        abi_file_path: abis/dodo_factory.json
        # handler removed - automatic registration from src/handlers/ (V3)
        events:
          - event: DVMDeployed
            field_selection:
              transaction_fields: ["hash"]
          - event: DPPDeployed
            field_selection:
              transaction_fields: ["hash"]
          - event: DSPDeployed
            field_selection:
              transaction_fields: ["hash"]

      - name: DodoPool
        # Point 1: Uses same start_block as factory. Point 3: addresses supplied exclusively via contractRegister in dodo_factory.ts
        start_block: ${POLYGON_START_BLOCK:-14722979}
        abi_file_path: abis/dodo_pool.json
        # handler removed - automatic registration from src/handlers/ (V3)
        events:
          - event: Sync
            field_selection:
              transaction_fields: ["hash"]
