name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx eslint src/

      - name: Format
        run: bunx prettier --check src/

      - name: Test
        run: bun --bun run vitest run

      - name: Test with coverage
        run: bun --bun run vitest run --coverage
